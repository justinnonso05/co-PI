<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { font-family: Arial, sans-serif; background-color: #f5f3ee; color: #1A1A18; margin: 0; padding: 0; }
  .wrapper { max-width: 600px; margin: 32px auto; padding: 0 16px; }
  .card { background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .header { background-color: #1A1A18; padding: 24px 32px; }
  .header-brand { font-size: 18px; font-weight: bold; color: #F2EDE4; letter-spacing: 0.05em; margin: 0; }
  .header-brand span { color: #2A7C75; }
  .badge { display: inline-block; background: #2A7C75; color: #fff; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 10px; border-radius: 4px; margin-top: 8px; }
  .body { padding: 32px; }
  .body p { font-size: 15px; line-height: 1.7; margin: 0 0 14px; color: #1A1A18; }
  .body p.muted { color: rgba(26,26,24,0.55); font-size: 13px; }
  .highlight { color: #2A7C75; font-weight: 600; }
  .info-box { background: rgba(42,124,117,0.07); border-radius: 6px; padding: 14px 18px; margin: 20px 0; }
  .info-box p { margin: 0; font-size: 14px; }
  .btn { display: inline-block; background: #1A1A18; color: #F2EDE4 !important; text-decoration: none; padding: 12px 28px; border-radius: 6px; font-size: 14px; font-weight: 600; margin-top: 8px; }
  .divider { border: none; border-top: 1px solid rgba(26,26,24,0.1); margin: 24px 0; }
  .footer { padding: 20px 32px; text-align: center; font-size: 12px; color: rgba(26,26,24,0.4); background: #f5f3ee; border-top: 1px solid rgba(26,26,24,0.08); }
  @media only screen and (max-width: 600px) {
    .wrapper { margin: 12px auto !important; padding: 0 8px !important; }
    .header { padding: 16px 20px !important; }
    .body { padding: 20px !important; }
    .footer { padding: 16px 20px !important; }
  }
</style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <div class="header">
        <p class="header-brand">CRMP <span>·</span> Research Platform</p>
        <span class="badge">{{badgeText}}</span>
      </div>
      <div class="body">
        {{bodyContent}}
      </div>
    </div>
    <div class="footer">
      <p>&copy; 2026 Collaborative Research Management Platform. All rights reserved.</p>
      <p>You are receiving this because you are a member of a project on CRMP.</p>
    </div>
  </div>
</body>
</html>
